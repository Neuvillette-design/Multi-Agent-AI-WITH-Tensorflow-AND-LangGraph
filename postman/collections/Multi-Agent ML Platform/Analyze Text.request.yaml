$kind: http-request
name: Analyze Text
method: POST
url: '{{baseUrl}}/analyze'
order: 4000
description: Submit text for multi-agent analysis (classification, sentiment, summarization)
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "text": "Your text to analyze goes here.",
      "tasks": ["classify", "sentiment", "summarize"]
    }
